site_name: Vector Graph RAG
site_url: https://zilliztech.github.io/vector-graph-rag/
site_description: A Graph RAG implementation using pure vector search with Milvus
repo_name: zilliztech/vector-graph-rag
repo_url: https://github.com/zilliztech/vector-graph-rag

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
  logo: assets/logo.svg
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/custom.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - How It Works: how-it-works.md
    - Design Philosophy: design-philosophy.md
  - API Reference:
    - Python API: python-api.md
    - REST API: rest-api.md
  - Frontend: frontend.md
  - Evaluation: evaluation.md
  - Use Cases: use-cases.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
